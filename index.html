<!DOCTYPE html>
<html>
<head>
  <title>For Ritu ❤️</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ffcccc, #ffe6e6);
    }
    h1 {
      color: #d6336c;
    }
    .heart {
      font-size: 100px;
      color: red;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .yes {
      background-color: #ff4d4d;
      color: white;
    }
    .no {
      background-color: #999;
      color: white;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>Ritu, will you go on a date with me? 💕</h1>
  <div class="heart">❤️</div>
  <button class="yes" onclick="alert('Yay! Can’t wait 💖')">Yes</button>
  <button class="no" onmouseover="moveButton(this)">No</button>

  <script>
    function moveButton(btn) {
      btn.style.position = "absolute";
      btn.style.top = Math.random() * window.innerHeight + "px";
      btn.style.left = Math.random() * window.innerWidth + "px";
    }
  </script>
</body>
</html>
